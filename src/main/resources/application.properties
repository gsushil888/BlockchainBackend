spring.application.name=block-chain-hashing
server.port=8080

# Active profile
spring.profiles.active=dev

# JWT — common across all profiles
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000
app.jwt.otp-token-expiration=300000

# Encryption passphrase — common (enabled flag set per profile)
app.encryption.passphrase=blockchain-hashing-secret-passphrase

# OTP
app.otp.ttl-minutes=5

# Profile picture storage
app.storage.upload-dir=uploads/profiles
app.storage.base-url=http://localhost:8080/uploads/profiles

# Static resource serving for uploaded files
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# JPA common
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.config=classpath:logback-spring.xml
